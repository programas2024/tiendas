<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopVerse - Asistente IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .chat-container { height: calc(100vh - 140px); }
        .burbuja-ia { border-bottom-left-radius: 4px; }
        .burbuja-usuario { border-bottom-right-radius: 4px; }
        
        /* Animaciones para el chat */
        .bubble-user {
            animation: slideInRight 0.3s ease;
        }
        .bubble-ia {
            animation: slideInLeft 0.3s ease;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Estrellas de calificación */
        #rating-estrellas i {
            transition: all 0.2s ease;
        }
        #rating-estrellas i:hover {
            transform: scale(1.2);
        }
        
        /* Botones de multimedia */
        #btn-adjuntar-imagen:hover,
        #btn-grabar-audio-chat:hover {
            transform: scale(1.05);
        }
        
        /* Preview de imagen */
        #preview-imagen {
            transition: all 0.3s ease;
        }
        
        /* Scroll personalizado */
        #caja-mensajes::-webkit-scrollbar {
            width: 6px;
        }
        #caja-mensajes::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        #caja-mensajes::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 10px;
        }

        /* Estilos para el input de audio */
        #btn-grabar-audio-chat.recording {
            background-color: #ef4444 !important;
            color: white !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .mensaje-imagen {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-4 py-3 shadow-md sticky top-0 z-10">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="soporte.html" class="hover:text-purple-200 text-xl transition mr-1">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="relative">
                    <div class="w-10 h-10 bg-white text-purple-600 rounded-full flex items-center justify-center shadow font-bold text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full animate-pulse"></span>
                </div>
                <div>
                    <h1 class="font-bold text-md leading-tight">Asistente Virtual ShopVerse</h1>
                    <p class="text-xs text-purple-100 flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-green-300 rounded-full"></span> Soporte Inteligente Activo
                    </p>
                </div>
            </div>
            <a href="index.html" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-xs font-medium transition">
                Salir al Inicio
            </a>
        </div>
    </header>

    <main class="container mx-auto max-w-2xl px-4 py-4">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col chat-container">
            
            <div id="caja-mensajes" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="flex items-start gap-2.5 max-w-[85%]">
                    <div class="w-8 h-8 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center flex-shrink-0 text-sm">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="bg-gray-100 text-gray-800 p-3 rounded-2xl burbuja-ia text-sm shadow-sm">
                        ¡Hola! 👋 Soy tu asistente inteligente de ShopVerse. ¿En qué puedo ayudarte hoy? Cuéntame tu problema detalladamente.
                    </div>
                </div>
            </div>

            <div class="p-3 border-t border-gray-100 bg-gray-50 rounded-b-2xl">
                <form id="form-chat" onsubmit="enviarMensajeUsuario(event)" class="flex flex-col gap-2">
                    <!-- Vista previa de imagen adjunta -->
                    <div id="preview-imagen" class="hidden relative">
                        <img id="imagen-preview" src="" alt="Vista previa" class="max-h-32 rounded-lg border border-gray-300">
                        <button type="button" onclick="eliminarImagen()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-600 transition">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <!-- Estado de grabación -->
                    <div id="estado-grabacion-chat" class="hidden text-xs text-red-500 flex items-center gap-2">
                        <i class="fas fa-circle animate-pulse"></i>
                        <span>Grabando...</span>
                        <span id="tiempo-grabacion-chat">00:00</span>
                    </div>
                    
                    <!-- Controles -->
                    <div class="flex gap-2">
                        <button type="button" id="btn-adjuntar-imagen" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 rounded-xl transition hover:scale-105" title="Adjuntar imagen">
                            <i class="fas fa-image"></i>
                        </button>
                        <button type="button" id="btn-grabar-audio-chat" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 rounded-xl transition hover:scale-105" title="Grabar audio">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <input type="text" id="input-mensaje" placeholder="Escribe tu mensaje aquí..." 
                            class="flex-1 px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm bg-white shadow-inner">
                        <button type="submit" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-5 rounded-xl font-medium hover:opacity-95 transition flex items-center justify-center shadow-md hover:scale-105">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>

        </div>   
    </main>

    <script src="tienda/js/chat.js"></script>
</body>
</html>
